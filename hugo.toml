baseURL = 'https://bryansebesta.net/'
languageCode = 'en-us'
title = "Bryan's Blog"

# --- Permalinks -------------------------------------------------------------
# DECISION (PRODUCT.md §6, §12.1): URLs are FLAT and do not encode information
# architecture. Content files live directly in content/ with no section
# subfolders, so /strategic-staircase/ is the natural URL. `type` frontmatter
# drives template selection instead of path. This makes "URLs don't encode IA"
# structurally true rather than merely configured — the menu can be redesigned
# annually without breaking a single link.
#
# Leaf bundles still work: content/dartmoor/index.md → /dartmoor/

# --- Content mounts ---------------------------------------------------------
# `content/` is generated and PRUNED — emit.py sweeps anything no manifest
# claims (pipeline/emit.py:prune_orphans). Hub pages are repo-authored
# structure, not vault notes, so putting them in content/ would mean either
# losing them on the next export or marking them `source: repo` and teaching
# the pruner to spare them.
#
# Mounting a second directory keeps the CLAUDE.md rule literally true —
# content/ stays generated and hand-edited by nobody — while Hugo still sees
# one merged content tree. Declaring mounts replaces the defaults for the
# `content` component ONLY, so static/, assets/, and layouts/ are unaffected.
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "pages"
    target = "content"

# --- Navigation -------------------------------------------------------------
# PRODUCT.md §6: nav is shallow and ACTIVITY-SHAPED — verbs, not formats. The
# spine is WRITING · LIBRARY · MAKING · LEARNING; note/essay/artifact/log appear
# only as filters inside a section, never as top-level items. That's what lets a
# new type ship without a nav redesign.
#
# THREE DISTINCT MENUS drive the chrome, each defined here and rendered by
# baseof.html: `main` (primary nav), `footer` (footer left column), and `social`
# (footer right column). See https://gohugo.io/configuration/menus/.
#
# No `Home` item: the "Bryan's Blog" wordmark (baseof .site-brand) IS the home
# link, so a nav entry for it would just duplicate that.
#
# `Now`, `Tools`, and `About` are real vault notes, not hubs. `pageRef` resolves
# each to its canonical /<id>/ URL at build time; `url` is the fallback for
# before it's stamped, and is also its alias, so it redirects either way.
# `Library` is the reading log (books, films) — the section formerly called
# Learning. The new `Learning` page is a placeholder for SRS study and surveys.
[menus]

# ── main — primary nav, top of every page ───────────────────────────────────
  [[menus.main]]
    name = 'Writing'
    pageRef = '/writing'
    weight = 10
  [[menus.main]]
    name = 'Library'
    pageRef = '/library'
    weight = 20
  [[menus.main]]
    name = 'Making'
    pageRef = '/making'
    weight = 30
  [[menus.main]]
    name = 'Learning'
    pageRef = '/learning'
    weight = 40
  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 50

# ── footer — footer left column ─────────────────────────────────────────────
# Modelled on daverupert.com — a bullet list that breaks into a second column
# after four items (styled in baseof.html), so the four activity hubs sit in the
# first column and the standing/utility pages in the second. Distinct from
# `main`: the footer carries the full set (adds Now, Tools, Colophon), the nav
# stays lean. Tools is a new vault note (Notebook/Pages/Tools.md).
  [[menus.footer]]
    name = 'Writing'
    pageRef = '/writing'
    weight = 10
  [[menus.footer]]
    name = 'Library'
    pageRef = '/library'
    weight = 20
  [[menus.footer]]
    name = 'Making'
    pageRef = '/making'
    weight = 30
  [[menus.footer]]
    name = 'Learning'
    pageRef = '/learning'
    weight = 40
  [[menus.footer]]
    name = 'About'
    pageRef = '/about'
    weight = 50
  [[menus.footer]]
    name = 'Now'
    pageRef = '/now'
    url = '/now/'
    weight = 60
  [[menus.footer]]
    name = 'Tools'
    pageRef = '/tools'
    url = '/tools/'
    weight = 70
  [[menus.footer]]
    name = 'Colophon'
    pageRef = '/colophon'
    weight = 80

# ── social — footer right column ────────────────────────────────────────────
# External identity links — `rel="me"` is added in the template so they double
# as IndieWeb identity (micro.blog consumes it).
  [[menus.social]]
    name = 'github'
    url = 'https://github.com/bsebesta'
    weight = 10
  [[menus.social]]
    name = 'microblog'
    url = 'https://micro.bryansebesta.net/'
    weight = 20

# --- Taxonomies -------------------------------------------------------------
# Only `tags` for now. `domain` is deferred (PRODUCT.md §4.1) — tags already
# exist in the vault, so they cost no new vocabulary. Declaring taxonomies
# explicitly also removes Hugo's default `categories`, which we don't want.
[taxonomies]
  tag = 'tags'

# --- Markup -----------------------------------------------------------------
# The pipeline emits raw HTML in one deliberate case: the `artifact` fence
# becomes an <iframe> (PRODUCT.md §330, §352). goldmark drops raw HTML unless
# `unsafe` is set, so the iframe would vanish silently without this. The input
# is trusted — every byte is generated by our own pipeline from the vault, not
# by third parties — so passthrough is safe here (PRODUCT.md §13, §500).
[markup.goldmark.renderer]
  unsafe = true

# Obsidian highlights. `==text==` is Obsidian's highlight syntax; Goldmark
# renders it literally without this. The `extras` extension (Hugo v0.144+)
# adds a <mark> parser for it. We enable ONLY `mark` — not extras' delete /
# subscript / superscript — because highlight is the sole Obsidian-ism that
# reaches Hugo unresolved: callouts have a render hook (render-blockquote.html),
# and wikilinks, embeds, and comments are rewritten during export. Scoped this
# narrow so `==>` in prose/Mermaid can't be mistaken for a highlight.
[markup.goldmark.extensions.extras.mark]
  enable = true

# --- Content types ----------------------------------------------------------
# Hugo treats .html (like .md) as a *content* format, so an artifact's .html
# sitting in a page bundle would be parsed as a headless page — no file URL, no
# publish — instead of a static resource the iframe can load. All real content
# here is markdown from the pipeline, so we narrow the content types to
# markdown alone. Now a bundled .html is a plain file resource: it publishes
# and gets a RelPermalink (PRODUCT.md §330).
[contentTypes]
  [contentTypes."text/markdown"]
