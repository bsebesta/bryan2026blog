# hues.yaml — CSS named colour → hue (0–360).
#
# Consumed by the `device` shortcode: when its `hue` param is a name rather
# than a number, it is looked up here. Only the HUE is used — the device
# gradient applies its own fixed saturation and lightness, so every artifact
# stays a matched set. The trailing comment shows each colour's true hex and
# its own HSL, which is why e.g. `beige` and `gold` share a hue but look
# nothing alike at full strength. Achromatic colours (s = 0%) resolve to
# hue 0; using one as a `hue` value is legal but reads as red.
#
# All 148 CSS Color Module Level 4 named colours. Add your own names below.

