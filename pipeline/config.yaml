# Pipeline configuration.
#
# The vault is READ-ONLY to this pipeline. Nothing here grants write access;
# `export` never writes to the vault under any flag.

vault_root: "/Users/bryansebesta/Library/CloudStorage/Dropbox/Bryan/Bryan's Notes"

# Output directory, relative to the repo root. Flat by design — see hugo.toml.
content_dir: "content"

# Where the pipeline remembers the previous publish set, so it can report a
# diff on each run. Committed to the repo.
# Per-note presentation overrides, keyed by PERMANENT ID:
#
#     presentation/<id>/style.css     styling only  → vault body, repo design
#     presentation/<id>/index.md      body override → repo body, repo design
#
# Keyed by id rather than slug so renaming a note never orphans its design.
#
# The vault note stays a normal note — drafted, linked, tagged, searchable,
# archived. Nothing about rendering enters it. The repo supplies presentation,
# and optionally a published body when the page is hand-built.
#
# This is the default route for art-directed essays (PRODUCT.md §9.3). The
# `source: repo` route remains for pages with no vault original at all.
presentation_dir: "presentation"

state_file: "pipeline/state/published.json"

# id → {current slug, previous slugs}. Every slug a note has ever had becomes
# an alias redirecting to the canonical /<id>/ URL, so renames never break a
# link. Committed to the repo — losing this file loses the redirects.
slug_history_file: "pipeline/state/slugs.json"

# Directories skipped entirely when indexing NOTES. Never indexed, so a
# wikilink pointing into them resolves as "not in vault".
exclude_dirs:
  - ".obsidian"
  - ".trash"
  - ".git"
  # Scaffolding, not content — and not "material Bryan didn't write" either,
  # so it doesn't belong under ~ Attachments. Also holds {{date}} placeholders
  # that aren't valid YAML until Obsidian substitutes them.
  - "~ Templates"

# SOURCE directories: material Bryan did not write — LLM analysis, course
# material, clippings, PDF publications. Potentially copyrightable.
#
# These are indexed but never publishable. Indexing matters because a published
# note may link to one: rather than flattening that to plain text, the pipeline
# substitutes the source's own `url:` and emits an external link. A private
# reading note becomes a citation pointing at the original.
#
# An entry with no "/" matches a folder of that name ANYWHERE in the vault, so
# nested attachment folders are caught too.
source_dirs:
  - "~ Attachments"
  # Microposts ingested from Micro.blog (PRODUCT.md §12.3). Source-tier for the
  # same structural reason as ~ Attachments, though the meaning differs: not
  # "material Bryan didn't write" but "material whose canonical home is
  # elsewhere". A published note linking to a micropost gets the micropost's
  # `url:` — its Micro.blog address — substituted, never a hosted copy.
  - "Logbook/Microposts"

# Directories skipped when indexing ASSETS. Deliberately does NOT exclude
# "~ Attachments" — that is precisely where the images live. Assets and notes
# need different exclusion lists for this reason.
asset_exclude_dirs:
  - ".obsidian"
  - ".trash"
  - ".git"

# Default facet values applied when frontmatter is silent.
# Defaults live HERE, not in Hugo's `cascade`, so the logic stays in the
# portable layer (PRODUCT.md §5.4).
# `growth` was removed 2026-07-21. It came from the digital-garden convention
# rather than from Bryan, was never set deliberately, and its stated purpose —
# permission to publish unfinished things — is already served by choosing to
# publish them. A label nobody chooses is friction with a rationale attached.
defaults:
  type: "note"

# Frontmatter keys carried through to the site when present. EVERYTHING NOT
# LISTED IS DROPPED.
#
# Most book and film metadata is for use in Obsidian — ratings, page counts,
# ISBNs, cast lists, personal notes. Only a handful belongs on a public page.
# An allowlist means adding a field to a template can never leak it: you have
# to come here and say so. Same principle as the publish gate.
# Per-type body section to publish. When a type is listed here, ONLY the content
# under that top-level (`# `) heading is published; everything else in the note —
# a `# Private Notes` section, reading notes, long quotations — stays in the vault.
#
# `log` covers books, films, and music (all note_type: log), so one note can hold
# a public review and private commentary side by side. Artifacts are deliberately
# absent: an artifact note's body IS its fenced interactive, not prose to slice.
#
# FAILS CLOSED. A `publish: true` note whose configured section is missing or
# empty publishes NOTHING and is listed under "PUBLISH: TRUE BUT NO SHARED REVIEW"
# in the export report — so a forgotten heading never silently leaks the private
# section, and never silently ships an empty page. The anchor heading itself is
# stripped from the output (the page already has its title).
publish_section:
  log: "Shared Review"

# Names match the vault's actual vocabulary (see pipeline/bookschema.py).
# Getting one wrong fails silently — the field simply never appears on the
# site — so these are worth checking against a real note.
extra_fields:
  - authors
  - contributors
  - publishers
  - publishedYear
  - director
  - released
  - releasedYear
  - runtime
  - mpaaRating
  - cover
  # External ids, so film pages can link out. No API key is needed at render
  # time — the URL is just themoviedb.org/movie/{id}.
  - imdbId
  - tmdbId

# Folder → temporality mapping, matched on the top-level folder.
# Frontmatter overrides.
temporality_by_folder:
  "Notebook": "evergreen"
  "Logbook": "dated"
default_temporality: "evergreen"

# Folder → note_type mapping, longest prefix wins. Frontmatter `note_type`
# overrides. Because the Logbook subfolders are type-shaped, this removes
# note_type from frontmatter for nearly every note — you only declare it for
# exceptions, like an essay living in Notebook alongside ordinary notes.
type_by_folder:
  "Notebook": "note"
  # Essays are a FORM, not a subject — so foldering them doesn't weaken the
  # flat-Notebook rule, which exists so a note about two subjects needn't pick
  # one. This also removes the last place a type had to be declared by hand:
  # every type now derives from folder, with no exceptions.
  "Notebook/Essays": "essay"
  # Standing pages — About, Colophon, Now — as opposed to STREAM content. There
  # is one of each, you reach them from the site chrome (nav, footer), and they
  # would be noise in a feed. The `page` type is the signal the templates use
  # to keep them out of the home index and the section hubs. Like Essays, a
  # subfolder here doesn't weaken flat-Notebook: standing pages aren't
  # multi-context knowledge notes, so nothing is lost by giving them a home.
  # These are also fine left UNSTAMPED — a standing page's slug (/about/) is a
  # meaningful permanent URL, not a title that will churn, so it needs no
  # opaque id.
  "Notebook/Pages": "page"
  "Logbook/Artifacts": "artifact"
  "Logbook/Books": "log"
  "Logbook/Movies": "log"
  "Logbook/Journal": "log"
  # Microposts are a stream, not a garden (PRODUCT.md §4.2) — the archetypal
  # `log`. Source-tier, so this type only matters for how a linking note treats
  # them, never for a page of their own.
  "Logbook/Microposts": "log"

# Micro.blog ingest (`make micro` / `make micro-api`). Writes microposts into
# the vault from either the Mac markdown export or the live Micropub API.
# See pipeline/micro.py and PRODUCT.md §12.3.
micro:
  export_dir: "_MICRO"                       # relative to vault_root (export mode)
  dest_dir: "Logbook/Microposts"            # relative to vault_root
  media_subdir: "_media"                    # photos, under dest_dir
  domain: "https://micro.bryansebesta.net"  # prepended to each post's path
  # API mode. The token is an app token (Account → App tokens) and lives ONLY
  # in the environment — never in the repo (same rule as the TMDB key). It is
  # read from the named variable at run time.
  micropub_url: "https://micro.blog/micropub"
  token_env: "MICROBLOG_TOKEN"
  mp_destination: ""                        # only needed with multiple blogs

# Hard block. Notes under these paths are NEVER published, whatever their
# frontmatter says — the flag is not consulted.
#
# This is a different failure mode from the private-note one. A clipping or a
# Formation doc could be published *deliberately*, by someone who forgot that
# clippings are other people's copyrighted writing, or that Formation holds
# personal strategy. Defence in depth: the gate protects against accident,
# this protects against intent.
never_publish_dirs:
  - "Logbook/Journal/Formation"
  - "Logbook/Clippings"
